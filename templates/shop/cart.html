{% extends "base.html" %}

{% block title %}Shopping Cart - ShopDjango{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2><i class="fas fa-shopping-cart me-2"></i>Shopping Cart</h2>

    <div id="cart-content">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Loading cart...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadCart() {
    const data = await apiCall('/api/cart/');
    renderCart(data);
}

function renderCart(cart) {
    const container = document.getElementById('cart-content');

    if (!cart.items || cart.items.length === 0) {
        container.innerHTML = `
            <div class="text-center py-5">
                <i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i>
                <h4>Your cart is empty</h4>
                <a href="{% url 'product-list' %}" class="btn btn-primary mt-3">Continue Shopping</a>
            </div>`;
        return;
    }

    let html = `<div class="row"><div class="col-lg-8">
        <div class="card"><div class="card-body"><table class="table align-middle">
        <thead><tr><th>Product</th><th>Price</th><th>Quantity</th><th>Subtotal</th><th></th></tr></thead><tbody>`;

    cart.items.forEach(item => {
        html += `<tr>
            <td><strong>${item.product_name}</strong></td>
            <td>$${item.product_price}</td>
            <td>
                <div class="input-group" style="max-width:130px">
                    <button class="btn btn-sm btn-outline-secondary" onclick="updateItem(${item.id}, ${item.quantity - 1})">-</button>
                    <input type="text" class="form-control form-control-sm text-center" value="${item.quantity}" readonly>
                    <button class="btn btn-sm btn-outline-secondary" onclick="updateItem(${item.id}, ${item.quantity + 1})">+</button>
                </div>
            </td>
            <td class="fw-bold">$${item.subtotal}</td>
            <td><button class="btn btn-sm btn-danger" onclick="removeItem(${item.id})"><i class="fas fa-trash"></i></button></td>
        </tr>`;
    });

    html += `</tbody></table></div></div></div>
        <div class="col-lg-4">
            <div class="card bg-light">
                <div class="card-body">
                    <h5>Order Summary</h5>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <span>Items (${cart.total_items})</span>
                        <strong>$${cart.total_price}</strong>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between h5">
                        <span>Total</span>
                        <span class="text-primary">$${cart.total_price}</span>
                    </div>
                    <a href="{% url 'checkout' %}" class="btn btn-primary w-100 mt-3 btn-lg">
                        <i class="fas fa-credit-card me-2"></i>Checkout
                    </a>
                    <a href="{% url 'product-list' %}" class="btn btn-outline-secondary w-100 mt-2">Continue Shopping</a>
                </div>
            </div>
        </div></div>`;

    container.innerHTML = html;
}

async function updateItem(itemId, quantity) {
    const data = await apiCall(`/api/cart/update/${itemId}/`, 'PUT', { quantity });
    renderCart(data);
    updateCartBadge();
}

async function removeItem(itemId) {
    const data = await apiCall(`/api/cart/remove/${itemId}/`, 'DELETE');
    renderCart(data);
    updateCartBadge();
}

loadCart();
</script>
{% endblock %}
